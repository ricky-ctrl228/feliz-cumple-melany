<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>💌 Una postal para ti</title>
<!-- Used by WhatsApp for the link preview (only applies to the hosted version) -->
<meta property="og:title" content="💌 Una postal para ti, Melany">
<meta property="og:description" content="Te la envía Ricardo. Tócala para abrirla 🎂">
<meta property="og:image" content="https://ricky-ctrl228.github.io/feliz-cumple-melany/preview.png">
<meta property="og:image:width" content="1200">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(170deg, #0b0b22, #221a4a 40%, #3b2a5d 58%, #7a4a8f 80%, #c98bb9);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* Estrellas que titilan en el fondo */
  body::before, body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
  }
  body::before {
    background-image:
      radial-gradient(2px 2px at 12% 20%, rgba(255,255,255,.9), transparent 60%),
      radial-gradient(2px 2px at 78% 12%, rgba(255,255,255,.8), transparent 60%),
      radial-gradient(1.5px 1.5px at 30% 68%, rgba(255,255,255,.7), transparent 60%),
      radial-gradient(2px 2px at 88% 55%, rgba(255,235,180,.9), transparent 60%),
      radial-gradient(1.5px 1.5px at 55% 30%, rgba(255,255,255,.75), transparent 60%);
    animation: twinkle 3.2s ease-in-out infinite;
  }
  body::after {
    background-image:
      radial-gradient(1.5px 1.5px at 22% 45%, rgba(255,255,255,.8), transparent 60%),
      radial-gradient(2px 2px at 65% 78%, rgba(255,235,180,.8), transparent 60%),
      radial-gradient(1.5px 1.5px at 42% 10%, rgba(255,255,255,.7), transparent 60%),
      radial-gradient(2px 2px at 92% 30%, rgba(255,255,255,.85), transparent 60%),
      radial-gradient(1.5px 1.5px at 8% 84%, rgba(255,235,180,.7), transparent 60%);
    animation: twinkle 3.2s ease-in-out 1.6s infinite;
  }
  @keyframes twinkle { 0%,100% { opacity: .3 } 50% { opacity: 1 } }

  .hint {
    position: fixed; left: 0; right: 0; bottom: 4vh;
    text-align: center; color: #fff; font-size: 1.05rem;
    text-shadow: 0 1px 4px rgba(0,0,0,.35);
    transition: opacity .4s; z-index: 30;
    animation: bob 1.8s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }

  /* ---------- Envelope ---------- */
  .envelope {
    position: relative; z-index: 1;
    width: min(85vw, 340px); aspect-ratio: 3 / 2;
    cursor: pointer;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,.45)) drop-shadow(0 0 26px rgba(255,205,130,.25));
  }
  .back {
    position: absolute; inset: 0;
    background: #1c2260; border-radius: 8px;
    z-index: 1;
  }
  .pocket {
    position: absolute; inset: 0;
    background: #35408f; border-radius: 8px;
    clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
    z-index: 3;
  }
  .flap {
    position: absolute; top: 0; left: 0; right: 0; height: 56%;
    background: #2a3378;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform: perspective(700px) rotateX(0deg);
    transform-origin: top center;
    transition: transform .6s ease-in;
    z-index: 4;
  }
  .flap::after {
    content: '🪷';
    position: absolute; left: 50%; bottom: 8px;
    transform: translateX(-50%);
    font-size: 1.8rem;
    text-shadow: 0 0 14px rgba(255,215,140,.9);
  }
  .envelope.open .flap { transform: perspective(700px) rotateX(180deg); }
  .envelope.out  .flap { z-index: 0; }
  .envelope.away .flap,
  .envelope.away .pocket,
  .envelope.away .back { opacity: 0; transition: opacity .5s; }

  /* ---------- Card ---------- */
  .card {
    position: absolute; left: 6%; right: 6%; top: 10%; bottom: 10%;
    background: #fdf9ee; border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    z-index: 2;
    transition: transform .9s cubic-bezier(.22,.61,.36,1);
  }
  .envelope.out .card { transform: translateY(-118%); }

  .card-face {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card.big .card-face { display: none; }
  .gem { filter: drop-shadow(0 0 6px rgba(155,89,182,.55)); }

  .card.big {
    position: fixed; left: 50%; top: 50%; right: auto; bottom: auto;
    width: min(88vw, 380px); height: auto; max-height: 82vh;
    overflow-y: auto;
    transform: translate(-50%, -50%);
    transition: none;
    animation: popIn .45s ease-out both;
    border-radius: 18px;
    border-top: 10px solid #d4af37;
    z-index: 40;
    cursor: pointer;
  }
  @keyframes popIn {
    from { transform: translate(-50%, -50%) scale(.5); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1);  opacity: 1; }
  }

  .content { display: none; }
  .card.big .content {
    display: block;
    padding: 30px 26px 26px;
    text-align: center;
    animation: fadeIn .6s .15s both;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  .balloons {
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .balloons span {
    display: inline-block; font-size: 2rem;
    animation: floaty 2.5s ease-in-out infinite;
  }
  .balloons span:nth-child(2) { animation-delay: .4s; }
  .balloons span:nth-child(3) { animation-delay: .8s; }
  @keyframes floaty { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

  h1 {
    font-family: 'Segoe Script', 'Brush Script MT', cursive;
    color: #7a5aa8; font-size: 2.3rem; line-height: 1.15;
    margin: 14px 0 18px;
  }
  .para    { font-weight: 700; color: #46395f; font-size: 1.15rem; margin-bottom: 14px; }
  .mensaje { color: #5b5370; line-height: 1.55; font-size: 1rem; margin-bottom: 18px; }
  .de      { font-style: italic; color: #9c92b0; font-size: .95rem; }

  .ps-cue {
    margin-top: 18px;
    color: #b8860b; font-weight: 700; font-size: 1rem;
    animation: bob 1.5s ease-in-out infinite;
  }
  .ps-btn {
    margin-top: 8px;
    padding: 10px 26px;
    border: none; border-radius: 999px;
    background: #e3c06a; color: #5b4300;
    font-family: inherit; font-weight: 700; font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(212,175,55,.5);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.08) } }
  .ps {
    display: none;
    margin-top: 18px;
    padding: 12px 16px;
    background: #f3edfa; border-radius: 10px;
    color: #55447a; font-size: .95rem; line-height: 1.5;
  }
  .ps.show { display: block; animation: fadeIn .5s both; }

  #confetti {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 60;
  }
  #stars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="envelope" id="envelope">
  <div class="back"></div>
  <div class="card" id="card">
    <div class="card-face">

    </div>
    <div class="content">
      <div class="balloons">
        <span><svg class="gem" width="32" height="32" viewBox="0 0 64 64" aria-hidden="true">
          <polygon points="16,58 16,32 21,20 21,58" fill="#7d3c98"/>
          <polygon points="21,58 21,20 27,34 27,58" fill="#9b59b6"/>
          <polygon points="37,58 37,30 43,18 43,58" fill="#a569bd"/>
          <polygon points="43,58 43,18 48,32 48,58" fill="#6c3483"/>
          <polygon points="24,58 24,22 31,6 31,58" fill="#8e44ad"/>
          <polygon points="31,58 31,6 38,22 38,58" fill="#b07cc6"/>
          <polygon points="28,15 31,6 34,15 31,22" fill="#d7bde2" opacity=".9"/>
          <polygon points="26,50 26,28 28,24 28,50" fill="#e8daef" opacity=".3"/>
          <polygon points="50,4 51.5,8.5 56,10 51.5,11.5 50,16 48.5,11.5 44,10 48.5,8.5" fill="#ffffff" opacity=".9"/>
        </svg></span>
        <span>🪷</span>
        <span><svg class="gem" width="32" height="32" viewBox="0 0 64 64" aria-hidden="true">
          <polygon points="16,58 16,32 21,20 21,58" fill="#7d3c98"/>
          <polygon points="21,58 21,20 27,34 27,58" fill="#9b59b6"/>
          <polygon points="37,58 37,30 43,18 43,58" fill="#a569bd"/>
          <polygon points="43,58 43,18 48,32 48,58" fill="#6c3483"/>
          <polygon points="24,58 24,22 31,6 31,58" fill="#8e44ad"/>
          <polygon points="31,58 31,6 38,22 38,58" fill="#b07cc6"/>
          <polygon points="28,15 31,6 34,15 31,22" fill="#d7bde2" opacity=".9"/>
          <polygon points="26,50 26,28 28,24 28,50" fill="#e8daef" opacity=".3"/>
          <polygon points="50,4 51.5,8.5 56,10 51.5,11.5 50,16 48.5,11.5 44,10 48.5,8.5" fill="#ffffff" opacity=".9"/>
        </svg></span>
      </div>
      <h1>¡Feliz<br>Cumpleaños!</h1>
      <p class="para" id="t-para"></p>
      <p class="mensaje" id="t-mensaje"></p>
      <p class="de" id="t-de"></p>
      <div class="ps-cue" id="psCue">Presiona aquí 👇</div>
      <button class="ps-btn" id="psBtn">P. D. 🎁</button>
      <p class="ps" id="t-ps"></p>
    </div>
  </div>
  <div class="pocket"></div>
  <div class="flap"></div>
</div>

<div class="hint" id="hint">Toca el sobre para abrirlo 💌</div>
<canvas id="confetti"></canvas>

<script>
/* ============================================================
   EDITA AQUÍ el texto de la postal antes de enviarla:
   ============================================================ */
const CONFIG = {
  para:    'Para Melany',
  mensaje: 'Eres de esas personas que mejoran todo a su alrededor. ' +
           'Te deseo un nuevo año lleno de salud, alegría y sueños ' +
           'cumplidos, y que la vida te devuelva todo lo bueno que tú das. ' +
           'Que cumplas muchos más.',
  de:      'Con mucho cariño, Ricardo',
  ps:      'Ah, y revisa tu cuenta… te deposité $400 para que te des un ' +
           'gusto. Es mi regalo de cumpleaños para ti — te lo mereces.'
};
/* Si la subes a un servidor, también puedes personalizarla por URL:
   postal.html?para=María&de=Ricky&mensaje=Hola...                 */

const q = new URLSearchParams(location.search);
document.getElementById('t-para').textContent    = q.get('para')    || CONFIG.para;
document.getElementById('t-mensaje').textContent = q.get('mensaje') || q.get('msg') || CONFIG.mensaje;
document.getElementById('t-de').textContent      = q.get('de')      || CONFIG.de;
document.getElementById('t-ps').textContent      = q.get('ps')      || CONFIG.ps;

document.getElementById('psBtn').addEventListener('click', e => {
  e.stopPropagation();
  e.currentTarget.style.display = 'none';
  document.getElementById('psCue').style.display = 'none';
  document.getElementById('t-ps').classList.add('show');
  burst(120);
});

/* ---------- Secuencia de apertura ---------- */
const envelope = document.getElementById('envelope');
const card     = document.getElementById('card');
const hint     = document.getElementById('hint');
let opened = false;

envelope.addEventListener('click', () => {
  if (opened) return;
  opened = true;
  hint.style.opacity = 0;
  envelope.classList.add('open');                     // la solapa se levanta
  setTimeout(() => envelope.classList.add('out'), 600);   // la tarjeta sube
  setTimeout(() => {                                       // la tarjeta crece
    envelope.classList.add('away');
    card.classList.add('big');
    burst(160);
    hint.textContent = 'Toca la tarjeta para más confeti 🎊';
    hint.style.opacity = 1;
  }, 1500);
});

card.addEventListener('click', e => {
  if (!card.classList.contains('big')) return;
  e.stopPropagation();
  burst(120);
});

/* ---------- Cielo estrellado ---------- */
const starsCanvas = document.getElementById('stars');
const sctx = starsCanvas.getContext('2d');

function drawStars() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = innerWidth, h = innerHeight;
  starsCanvas.width = w * dpr;
  starsCanvas.height = h * dpr;
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Las estrellas se desvanecen hacia el "amanecer" en la parte baja
  const fade = y => Math.max(0, Math.min(1, 1 - (y / h - 0.52) * 2));
  const gauss = () => (Math.random() + Math.random() + Math.random() - 1.5) / 1.5;

  // Trayectoria diagonal de la vía láctea
  const bandX = t => t * w;
  const bandY = t => h * (0.08 + 0.40 * t);

  function blob(x, y, r, rgba) {
    const grad = sctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, 'rgba(' + rgba + ')');
    grad.addColorStop(1, 'rgba(' + rgba.replace(/[\d.]+\)?$/, '0') + ')');
    sctx.fillStyle = grad;
    sctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  // 1. Resplandor ancho y tenue de la banda
  for (let i = 0; i < 40; i++) {
    const t = Math.random();
    blob(bandX(t) + gauss() * w * 0.02, bandY(t) + gauss() * h * 0.09,
         70 + Math.random() * 130, '180,170,220,0.03');
  }
  // 2. Núcleo más brillante y cálido
  for (let i = 0; i < 30; i++) {
    const t = Math.random();
    blob(bandX(t), bandY(t) + gauss() * h * 0.035,
         30 + Math.random() * 60, '235,225,235,0.045');
  }
  // 3. Grietas de polvo oscuro que parten el núcleo
  for (let i = 0; i < 22; i++) {
    const t = 0.1 + Math.random() * 0.8;
    blob(bandX(t) + gauss() * w * 0.015, bandY(t) + gauss() * h * 0.02,
         20 + Math.random() * 45, '12,10,28,0.1');
  }
  // 4. Toques tenues de nebulosa rosada
  for (let i = 0; i < 5; i++) {
    const t = Math.random();
    blob(bandX(t), bandY(t) + gauss() * h * 0.05,
         25 + Math.random() * 50, '255,160,180,0.035');
  }

  // Casi todas blancas, algunas azuladas o cálidas (como estrellas reales)
  function starColor() {
    const p = Math.random();
    return p < .78 ? '255,255,255' : p < .90 ? '215,228,255' : '255,238,214';
  }

  // 5. Polvo de estrellas de la banda — miles de puntos diminutos
  const dustN = Math.round(w * h / 900);
  for (let i = 0; i < dustN; i++) {
    const t = Math.random();
    const x = bandX(t) + gauss() * w * 0.05;
    const y = bandY(t) + gauss() * h * 0.075;
    const a = (0.04 + Math.random() * 0.22) * fade(y);
    if (a < 0.02) continue;
    sctx.fillStyle = 'rgba(' + starColor() + ',' + a.toFixed(3) + ')';
    const s = Math.random() < 0.85 ? 1 : 1.5;
    sctx.fillRect(x, y, s, s);
  }

  // 6. Campo general — ley de potencias: muchas débiles, muy pocas brillantes
  const fieldN = Math.round(w * h / 1400);
  for (let i = 0; i < fieldN; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    const m = Math.pow(Math.random(), 3.2);
    const r = 0.3 + m * 1.1;
    const a = (0.06 + m * 0.85) * fade(y);
    if (a < 0.02) continue;
    sctx.fillStyle = 'rgba(' + starColor() + ',' + a.toFixed(3) + ')';
    if (r < 0.7) sctx.fillRect(x, y, r * 2, r * 2);
    else { sctx.beginPath(); sctx.arc(x, y, r, 0, Math.PI * 2); sctx.fill(); }
  }

  // 7. Estrellas medianas con halo tenue
  for (let i = 0; i < 18; i++) {
    const x = Math.random() * w, y = Math.random() * h * 0.8;
    const a = (0.55 + Math.random() * 0.45) * fade(y);
    if (a < 0.1) continue;
    const r = 0.8 + Math.random() * 0.6;
    blob(x, y, r * 4, '255,255,255,' + (a * 0.25).toFixed(3));
    sctx.fillStyle = 'rgba(' + starColor() + ',' + a.toFixed(3) + ')';
    sctx.beginPath(); sctx.arc(x, y, r, 0, Math.PI * 2); sctx.fill();
  }

  // 8. Unas pocas brillantes con halo amplio y destello discreto
  for (let i = 0; i < 5; i++) {
    const x = Math.random() * w, y = Math.random() * h * 0.55;
    const r = 1.1 + Math.random() * 0.7;
    const glowR = r * 12;
    const grad = sctx.createRadialGradient(x, y, 0, x, y, glowR);
    grad.addColorStop(0, 'rgba(255,255,255,0.35)');
    grad.addColorStop(0.25, 'rgba(225,220,255,0.08)');
    grad.addColorStop(1, 'rgba(225,220,255,0)');
    sctx.fillStyle = grad;
    sctx.fillRect(x - glowR, y - glowR, glowR * 2, glowR * 2);
    sctx.fillStyle = 'rgba(255,255,255,0.95)';
    sctx.beginPath(); sctx.arc(x, y, r, 0, Math.PI * 2); sctx.fill();
    sctx.strokeStyle = 'rgba(255,255,255,0.2)';
    sctx.lineWidth = 0.6;
    const s = glowR * 0.7;
    sctx.beginPath();
    sctx.moveTo(x - s, y); sctx.lineTo(x + s, y);
    sctx.moveTo(x, y - s); sctx.lineTo(x, y + s);
    sctx.stroke();
  }
}
drawStars();
addEventListener('resize', drawStars);

/* ---------- Confeti ---------- */
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
const COLORS = ['#ffd700','#f3e5ab','#e8b4d8','#b39ddb','#ffffff','#d4af37','#f7c8dc'];
let pieces = [];

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resize);
resize();

function burst(n) {
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: canvas.width / 2, y: canvas.height * 0.35,
      vx: (Math.random() - .5) * 14,
      vy: Math.random() * -13 - 4,
      w: 5 + Math.random() * 6, h: 8 + Math.random() * 8,
      rot: Math.random() * Math.PI, vr: (Math.random() - .5) * .3,
      color: COLORS[i % COLORS.length]
    });
  }
}

(function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces = pieces.filter(p => p.y < canvas.height + 40);
  for (const p of pieces) {
    p.vy += .25; p.vx *= .99;
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
